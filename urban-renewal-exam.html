<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="都更模考" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>都市更新推動師模擬考試</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <style>
    body { background: #f1f5f9; }
    .choice { transition: background .18s, border-color .18s; }
    .choice:hover { border-color: #14b8a6; }
    .correct { background:#dcfce7!important; border-color:#22c55e!important; }
    .wrong { background:#fee2e2!important; border-color:#ef4444!important; }
  </style>
</head>
<body class="min-h-screen text-slate-800">
  <main class="mx-auto max-w-4xl px-4 pb-16 pt-6 sm:px-6">
    <header class="mb-6 flex items-start justify-between gap-3">
      <div><p class="text-sm font-semibold text-teal-700">URBAN RENEWAL EXAM</p><h1 class="text-2xl font-black tracking-tight sm:text-3xl">都市更新推動師模擬考試</h1></div>
      <button id="adminToggle" class="rounded-xl bg-slate-800 px-4 py-2 text-sm font-bold text-white shadow hover:bg-slate-700">進入後台管理</button>
    </header>

    <section id="examView">
      <div id="welcome" class="rounded-3xl bg-gradient-to-br from-teal-700 to-cyan-700 p-7 text-white shadow-lg">
        <h2 class="text-2xl font-black">準備好開始挑戰了嗎？</h2>
        <p class="mt-2 text-teal-50">每次隨機抽取 25 題單選與 25 題複選，共 50 題、滿分 100 分。</p>
        <p id="bankInfo" class="mt-4 text-sm text-teal-100"></p>
        <button id="startBtn" disabled class="mt-6 rounded-xl bg-white px-5 py-3 font-bold text-teal-800 shadow hover:bg-teal-50 disabled:cursor-wait disabled:opacity-60">載入題庫中…</button>
      </div>
      <div id="examArea" class="hidden">
        <div class="sticky top-0 z-10 mb-4 flex items-center justify-between rounded-2xl border bg-white/95 px-4 py-3 shadow-sm backdrop-blur"><span id="progress" class="font-bold text-teal-800"></span><button id="submitBtn" class="rounded-xl bg-teal-700 px-4 py-2 text-sm font-bold text-white hover:bg-teal-800">提交考卷</button></div>
        <div id="questions" class="space-y-5"></div>
        <div class="mt-6 text-center"><button id="submitBtnBottom" class="rounded-xl bg-teal-700 px-6 py-3 font-bold text-white shadow hover:bg-teal-800">提交考卷</button></div>
      </div>
      <div id="result" class="mt-6 hidden rounded-3xl border border-teal-200 bg-teal-50 p-6 text-center"><p class="text-sm font-bold text-teal-700">本次成績</p><p id="score" class="my-2 text-5xl font-black text-teal-800"></p><p id="scoreText" class="text-slate-600"></p><button id="retryBtn" class="mt-5 rounded-xl bg-teal-700 px-5 py-3 font-bold text-white">再考一次</button></div>
    </section>

    <section id="adminView" class="hidden">
      <div class="rounded-3xl border border-indigo-100 bg-white p-5 shadow-sm">
        <div class="flex flex-wrap items-center justify-between gap-3"><div><h2 class="text-xl font-black text-indigo-950">後台題庫管理</h2><p class="text-sm text-slate-500">修改後會立即儲存於這台裝置。</p></div><div class="flex gap-2"><label class="cursor-pointer rounded-xl bg-indigo-100 px-3 py-2 text-sm font-bold text-indigo-800">匯入題庫<input id="importInput" type="file" accept="application/json,.json" multiple class="hidden"></label><button id="exportBtn" class="rounded-xl bg-indigo-700 px-3 py-2 text-sm font-bold text-white">匯出最新題庫</button></div></div>
        <div class="mt-5 grid gap-3 sm:grid-cols-3"><select id="filterType" class="rounded-xl border p-3"><option value="all">全部類型</option><option value="single_choice">單選題</option><option value="multiple_choice">複選題</option></select><input id="filterNo" inputmode="numeric" placeholder="依原始題號搜尋" class="rounded-xl border p-3"><input id="filterText" placeholder="搜尋題目文字" class="rounded-xl border p-3"></div>
        <div id="questionList" class="mt-5 max-h-80 space-y-2 overflow-y-auto"></div>
      </div>
      <form id="editor" class="mt-5 hidden rounded-3xl border border-indigo-100 bg-white p-5 shadow-sm">
        <h3 id="editTitle" class="font-black text-indigo-950"></h3><input id="editType" type="hidden"><input id="editIndex" type="hidden">
        <label class="mt-4 block text-sm font-bold">題目文字<textarea id="editQuestion" required class="mt-1 w-full rounded-xl border p-3" rows="4"></textarea></label>
        <div id="optionEditors" class="mt-4 grid gap-3"></div>
        <fieldset class="mt-4"><legend class="text-sm font-bold">正確答案</legend><div id="answerEditors" class="mt-2 flex flex-wrap gap-3"></div></fieldset>
        <button class="mt-5 rounded-xl bg-indigo-700 px-5 py-3 font-bold text-white">儲存修改</button>
      </form>
    </section>
  </main>

  <div id="adminPasswordModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/60 p-4" role="dialog" aria-modal="true" aria-labelledby="adminPasswordTitle">
    <form id="adminPasswordForm" class="w-full max-w-sm rounded-3xl bg-white p-6 shadow-2xl">
      <p class="text-sm font-bold text-indigo-700">後台保護</p>
      <h2 id="adminPasswordTitle" class="mt-1 text-xl font-black text-slate-900">請輸入管理密碼</h2>
      <p class="mt-2 text-sm leading-6 text-slate-500">驗證成功後才能開啟題庫管理。</p>
      <label class="mt-5 block text-sm font-bold text-slate-700">管理密碼
        <input id="adminPasswordInput" type="password" inputmode="numeric" autocomplete="current-password" required class="mt-2 w-full rounded-xl border border-slate-300 p-3 text-lg tracking-widest outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" placeholder="請輸入密碼">
      </label>
      <p id="adminPasswordError" class="mt-3 hidden text-sm font-bold text-red-600">密碼錯誤，請再試一次。</p>
      <div class="mt-6 flex gap-3"><button type="button" id="adminPasswordCancel" class="flex-1 rounded-xl bg-slate-100 px-4 py-3 font-bold text-slate-700">取消</button><button type="submit" class="flex-1 rounded-xl bg-indigo-700 px-4 py-3 font-bold text-white">確認進入</button></div>
    </form>
  </div>

const STORAGE_KEY = 'urbanRenewalExamQuestionBank.v1';
let bank, exam = [], submitted = false;
const $ = id => document.getElementById(id);

function normalizeQuestion(q, type, fallback) {
  const rawOptions = q.options || q.choices || q.answers || q.o || [q.option1,q.option2,q.option3,q.option4];
  const options = Array.isArray(rawOptions) ? rawOptions.map(x => typeof x === 'object' ? (x.text || x.content || x.label || '') : String(x)) : Object.values(rawOptions || {});
  let answer = q.answer ?? q.correct_answer ?? q.correctAnswer ?? q.correct ?? q.ans ?? q.答案;
  if (Array.isArray(answer)) answer = answer.map(toIndex); else if (typeof answer === 'string' && type === 'multiple_choice') answer = answer.split(/[,，、\s]+/).filter(Boolean).map(toIndex); else answer = [toIndex(answer)];
  return { id: q.id ?? q.number ?? q.question_number ?? q.no ?? q.題號 ?? fallback, question: q.question ?? q.q ?? q.content ?? q.text ?? q.題目 ?? '', options: options.slice(0,4), answer: [...new Set(answer.filter(n => Number.isInteger(n) && n >= 0 && n < options.length))] };
}
function toIndex(value) { if (typeof value === 'number') return value >= 1 ? value - 1 : value; const s=String(value ?? '').trim().toUpperCase(); const letters='ABCD'; if (letters.includes(s)) return letters.indexOf(s); const n=Number(s); return n===0 ? 0 : n-1; }
function normalizeBank(data) {
  const s = data.single_choice || data.singleChoice || data.single || data.單選題 || [];
  const m = data.multiple_choice || data.multipleChoice || data.multiple || data.複選題 || [];
  return {single_choice:s.map((q,i)=>normalizeQuestion(q,'single_choice',i+1)),multiple_choice:m.map((q,i)=>normalizeQuestion(q,'multiple_choice',i+1))};
}
async function initialBank() { const bytes=Uint8Array.from(atob(INITIAL_QUESTION_BANK_GZIP_BASE64.join('')),c=>c.charCodeAt(0)); if ('DecompressionStream' in window) { const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip')); return JSON.parse(await new Response(stream).text()); } if (window.pako) return JSON.parse(new TextDecoder().decode(window.pako.ungzip(bytes))); throw new Error('此瀏覽器無法解壓題庫，請確認網路連線後重新開啟。'); }
async function init() { const saved=localStorage.getItem(STORAGE_KEY); let localBank=null; try { localBank=saved ? normalizeBank(JSON.parse(saved)) : null; } catch (_) {} const allQuestions=localBank ? [...localBank.single_choice,...localBank.multiple_choice] : []; const isEmpty=!localBank || !allQuestions.length || allQuestions.every(q=>!q.question.trim()); bank=isEmpty ? normalizeBank(await initialBank()) : localBank; if (isEmpty) save(); refreshInfo(); $('startBtn').disabled=false; $('startBtn').textContent='開始測驗'; }
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(bank)); }
function refreshInfo() { $('bankInfo').textContent=`目前題庫：單選 ${bank.single_choice.length} 題／複選 ${bank.multiple_choice.length} 題`; }
function shuffle(a) { return [...a].sort(()=>Math.random()-.5); }
function startExam() { if(bank.single_choice.length<25 || bank.multiple_choice.length<25) return alert('題庫不足：單選與複選各至少需要 25 題。請先於後台匯入完整題庫。'); exam=[...shuffle(bank.single_choice).slice(0,25).map(q=>({...q,type:'single_choice'})),...shuffle(bank.multiple_choice).slice(0,25).map(q=>({...q,type:'multiple_choice'}))]; submitted=false; $('welcome').classList.add('hidden');$('examArea').classList.remove('hidden');$('result').classList.add('hidden');renderExam();window.scrollTo({top:0,behavior:'smooth'}); }
function renderExam() { $('progress').textContent=`本次共 ${exam.length} 題（每題 2 分）`; $('questions').innerHTML=exam.map((q,qi)=>`<article class="rounded-2xl border bg-white p-5 shadow-sm"><h3 class="font-black leading-6">【${q.type==='single_choice'?'單選題':'複選題'}】原始題號：${esc(q.id)}</h3><p class="mt-3 whitespace-pre-wrap leading-7">${esc(q.question)}</p><div class="mt-4 space-y-2">${q.options.map((o,oi)=>`<label id="choice-${qi}-${oi}" class="choice flex cursor-pointer gap-3 rounded-xl border p-3"><input class="mt-1" type="${q.type==='single_choice'?'radio':'checkbox'}" name="q-${qi}" value="${oi}"><span><b>${'ABCD'[oi]}.</b> ${esc(o)}</span></label>`).join('')}</div><div id="feedback-${qi}" class="hidden mt-4 rounded-xl bg-slate-50 p-3 text-sm"></div></article>`).join(''); }
function submitExam() { if(submitted)return; submitted=true; let correct=0; exam.forEach((q,qi)=>{ const selected=[...document.querySelectorAll(`input[name="q-${qi}"]:checked`)].map(x=>+x.value).sort(); const right=[...q.answer].sort(); const ok=selected.length===right.length&&selected.every((v,i)=>v===right[i]); if(ok)correct++; q.options.forEach((_,oi)=>{const el=$(`choice-${qi}-${oi}`);if(right.includes(oi))el.classList.add('correct'); if(selected.includes(oi)&&!right.includes(oi))el.classList.add('wrong');}); const fb=$(`feedback-${qi}`);fb.classList.remove('hidden');fb.innerHTML=`<b class="${ok?'text-green-700':'text-red-700'}">${ok?'答對！':'答錯。'}</b> 正確答案：${right.map(i=>'ABCD'[i]).join('、')}`; }); const points=correct*2;$('score').textContent=`${points} 分`;$('scoreText').textContent=`答對 ${correct} / 50 題`;$('result').classList.remove('hidden');$('submitBtn').disabled=true;$('submitBtn').classList.add('opacity-50'); }
const ADMIN_PASSWORD='0512';
function showAdmin(show) { $('examView').classList.toggle('hidden',show);$('adminView').classList.toggle('hidden',!show);$('adminToggle').textContent=show?'返回前台測驗':'進入後台管理';if(show)renderList(); }
function openAdminLock(){ $('adminPasswordInput').value='';$('adminPasswordError').classList.add('hidden');$('adminPasswordModal').classList.remove('hidden');$('adminPasswordModal').classList.add('flex');setTimeout(()=>$('adminPasswordInput').focus(),0); }
function closeAdminLock(){ $('adminPasswordModal').classList.add('hidden');$('adminPasswordModal').classList.remove('flex'); }
function toggleAdmin() { if(!$('adminView').classList.contains('hidden')) return showAdmin(false); openAdminLock(); }
function renderList(){const type=$('filterType').value,no=$('filterNo').value.trim(),text=$('filterText').value.trim().toLowerCase();const rows=[];for(const t of ['single_choice','multiple_choice'])if(type==='all'||type===t)bank[t].forEach((q,i)=>{if((!no||String(q.id).includes(no))&&(!text||q.question.toLowerCase().includes(text)))rows.push(`<button data-type="${t}" data-index="${i}" class="edit-row w-full rounded-xl border p-3 text-left hover:bg-indigo-50"><b class="text-indigo-700">${t==='single_choice'?'單選':'複選'}｜原始題號 ${esc(q.id)}</b><span class="ml-2 text-sm text-slate-600">${esc(q.question).slice(0,80)}</span></button>`)});$('questionList').innerHTML=rows.length?rows.join(''):'<p class="p-3 text-sm text-slate-500">找不到符合的題目。</p>';document.querySelectorAll('.edit-row').forEach(b=>b.onclick=()=>openEditor(b.dataset.type,+b.dataset.index));}
function openEditor(type,index){const q=bank[type][index];$('editor').classList.remove('hidden');$('editType').value=type;$('editIndex').value=index;$('editTitle').textContent=`編輯${type==='single_choice'?'單選':'複選'}題｜原始題號：${q.id}`;$('editQuestion').value=q.question;$('optionEditors').innerHTML=[0,1,2,3].map(i=>`<label class="text-sm font-bold">選項 ${'ABCD'[i]}<input class="option-input mt-1 w-full rounded-xl border p-3" required value="${attr(q.options[i]||'')}"></label>`).join('');$('answerEditors').innerHTML=[0,1,2,3].map(i=>`<label class="flex items-center gap-2 rounded-lg bg-slate-50 px-3 py-2"><input type="${type==='single_choice'?'radio':'checkbox'}" name="correct-answer" value="${i}" ${q.answer.includes(i)?'checked':''}> ${'ABCD'[i]}</label>`).join('');$('editor').scrollIntoView({behavior:'smooth',block:'start'});}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}function attr(s){return esc(s);}
$('startBtn').onclick=startExam;$('retryBtn').onclick=startExam;$('submitBtn').onclick=submitExam;$('submitBtnBottom').onclick=submitExam;$('adminToggle').onclick=toggleAdmin;
$('adminPasswordCancel').onclick=closeAdminLock;$('adminPasswordForm').onsubmit=e=>{e.preventDefault();if($('adminPasswordInput').value!==ADMIN_PASSWORD){$('adminPasswordError').classList.remove('hidden');$('adminPasswordInput').focus();return;}closeAdminLock();showAdmin(true);};
['filterType','filterNo','filterText'].forEach(id=>$(id).addEventListener('input',renderList));
$('editor').onsubmit=e=>{e.preventDefault();const type=$('editType').value,q=bank[type][+$('editIndex').value],answers=[...document.querySelectorAll('input[name="correct-answer"]:checked')].map(x=>+x.value);if(!answers.length)return alert('請選擇正確答案。');q.question=$('editQuestion').value.trim();q.options=[...document.querySelectorAll('.option-input')].map(x=>x.value.trim());q.answer=answers;save();refreshInfo();renderList();alert('已儲存修改。');};
$('exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify(bank,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='urban-renewal-question-bank.json';a.click();URL.revokeObjectURL(a.href);};
$('importInput').onchange=async e=>{try{const files=[...e.target.files];if(!files.length)return;const merged={single_choice:[],multiple_choice:[]};for(const f of files){const d=JSON.parse(await f.text()),n=normalizeBank(d);merged.single_choice.push(...n.single_choice);merged.multiple_choice.push(...n.multiple_choice);}if(!merged.single_choice.length&&!merged.multiple_choice.length)throw Error('找不到 single_choice 或 multiple_choice 題目。');bank=merged;save();refreshInfo();renderList();$('editor').classList.add('hidden');alert(`已匯入：單選 ${bank.single_choice.length} 題、複選 ${bank.multiple_choice.length} 題。`);}catch(err){alert('匯入失敗：'+err.message)}finally{e.target.value='';}};
init().catch(err=>{ console.error(err); $('bankInfo').textContent='題庫載入失敗：請確認手機已連網後重新開啟。'; $('startBtn').textContent='題庫載入失敗'; });
</script>
</body>
</html>
